general {
    hide_cursor = true
}

background {
    monitor =
    color = rgb(1a1b26)
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 300 50
    outline_thickness = 2
    outer_color = rgb(414868)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = <span foreground="##7aa2f7">mot de passe</span>
    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%H:%M'
    color = rgb(c0caf5)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
