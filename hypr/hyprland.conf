################
### MONITEURS ###
################
monitor = DP-3, 3840x2160@60, 0x0, 1.5
monitor = eDP-1, 1920x1200@60, 320x1440, 1.0


###############
### PROGRAMMES ###
###############
$terminal    = kitty
$fileManager = nautilus
$menu        = fuzzel


###############
### AUTOSTART ###
###############
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = xsettingsd
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = /usr/lib/xdg-desktop-portal-gtk
exec-once = /usr/lib/xdg-desktop-portal
exec-once = ~/.config/hypr/scripts/waybar-launch.sh
exec-once = hypridle
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/wallpaper.sh
exec-once = [workspace 1] kitty
exec-once = [workspace special:keepass silent] keepassxc
exec-once = [workspace special:terminal silent] kitty --class kitty-scratch


###############
### ENV VARS ###
###############
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland


#################
### APPARENCE ###
#################
general {
    gaps_in      = 4
    gaps_out     = 8
    border_size  = 2
    col.active_border   = rgba(83a598ff) rgba(d3869bff) 45deg
    col.inactive_border = rgba(3c3836aa)
    layout       = dwindle
}

decoration {
    rounding = 8

    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(1a1a2ecc)
    }

    blur {
        enabled = true
        size    = 4
        passes  = 2
    }
}

animations {
    enabled = true

    bezier = smooth, 0.05, 0.9, 0.1, 1.0

    animation = windows,    1, 4,  smooth, popin 80%
    animation = fade,       1, 4,  smooth
    animation = workspaces, 1, 2,  smooth, slide
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

xwayland {
    force_zero_scaling = true
}

dwindle {
    preserve_split = true
}


###########
### INPUT ###
###########
input {
    kb_layout  = fr
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = false
        tap-to-click      = true
        disable_while_typing = true
    }
}


#################
### RACCOURCIS ###
#################
$mod = SUPER

bind = $mod, Return,    exec, $terminal
bind  = $mod, Space,    exec, ~/.config/hypr/scripts/keybindings.sh
bindr = SUPER, Super_L, exec, ~/.config/hypr/scripts/menu-toggle.sh
bind = $mod, E,         exec, $fileManager
bind = $mod, C,         killactive
bind = $mod SHIFT, K,   exec, hyprctl kill
bind = ALT, F4,         killactive
bind = $mod, tab,       exec, ~/.config/hypr/scripts/workspace-switcher.sh
bind = $mod, D,         exec, ~/.config/hypr/scripts/toggle-theme.sh
bind = $mod SHIFT, E,   exit
bind = $mod SHIFT, R,   exec, hyprctl reload
bind = $mod, L,          exec, hyprlock
bind = CTRL ALT, Delete, exec, systemctl reboot
bind = CTRL ALT, Insert, exec, systemctl suspend
bind = CTRL ALT, End,    exec, systemctl poweroff
bind = CTRL ALT, Home,   exec, systemctl hibernate
bind = $mod, V,         togglefloating
bind = $mod, F,         fullscreen
bind = $mod, dollar,    togglespecialworkspace, keepass
bind = , twosuperior,   togglespecialworkspace, terminal

# Cycle fenêtres
bind = ALT, Tab,       exec, hyprswitch simple
bind = ALT SHIFT, Tab, exec, hyprswitch simple --reverse

# Focus
bind = $mod,  left,  movefocus, l
bind = $mod,  right, movefocus, r
bind = $mod,  up,    movefocus, u
bind = $mod,  down,  movefocus, d
bind = CTRL ALT, left,  workspace, e-1
bind = CTRL ALT, right, workspace, e+1

# Déplacer fenêtre
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces (clavier AZERTY) — Super+chiffre ou Ctrl+Alt+chiffre
bind = $mod,       ampersand,  workspace, 1
bind = $mod,       eacute,     workspace, 2
bind = $mod,       quotedbl,   workspace, 3
bind = $mod,       apostrophe, workspace, 4
bind = $mod,       parenleft,  workspace, 5
bind = $mod,       minus,      workspace, 6
bind = $mod,       egrave,     workspace, 7
bind = $mod,       underscore, workspace, 8
bind = $mod,       ccedilla,   workspace, 9
bind = $mod,       agrave,     workspace, 10

bind = CTRL ALT, ampersand,  workspace, 1
bind = CTRL ALT, eacute,     workspace, 2
bind = CTRL ALT, quotedbl,   workspace, 3
bind = CTRL ALT, apostrophe, workspace, 4
bind = CTRL ALT, parenleft,  workspace, 5
bind = CTRL ALT, minus,      workspace, 6
bind = CTRL ALT, egrave,     workspace, 7
bind = CTRL ALT, underscore, workspace, 8
bind = CTRL ALT, ccedilla,   workspace, 9
bind = CTRL ALT, agrave,     workspace, 10

# Envoyer fenêtre vers workspace
bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5
bind = $mod SHIFT, minus,      movetoworkspace, 6
bind = $mod SHIFT, egrave,     movetoworkspace, 7
bind = $mod SHIFT, underscore, movetoworkspace, 8
bind = $mod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mod SHIFT, agrave,     movetoworkspace, 10

# Déplacer/redimensionner à la souris
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize au clavier (mod+R, puis flèches ou hjkl, Escape pour quitter)
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left,  resizeactive, -20 0
binde = , down,  resizeactive, 0 20
binde = , up,    resizeactive, 0 -20
binde = , l, resizeactive, 20 0
binde = , h, resizeactive, -20 0
binde = , j, resizeactive, 0 20
binde = , k, resizeactive, 0 -20
bind  = , escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# Volume
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Luminosité
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


######################
### WORKSPACES ###
######################

workspace = 1,  persistent = true, bordercolor:rgba(c4956aff) rgba(c4956acc) 45deg
workspace = 2,  persistent = true, bordercolor:rgba(e88888ff) rgba(e88888cc) 45deg
workspace = 3,  persistent = true, bordercolor:rgba(f0a870ff) rgba(f0a870cc) 45deg
workspace = 4,  persistent = true, bordercolor:rgba(e8e070ff) rgba(e8e070cc) 45deg
workspace = 5,  persistent = true, bordercolor:rgba(8ec07cff) rgba(8ec07ccc) 45deg
workspace = 6,  persistent = true, bordercolor:rgba(83a8d8ff) rgba(83a8d8cc) 45deg
workspace = 7,  persistent = true, bordercolor:rgba(b888d0ff) rgba(b888d0cc) 45deg
workspace = 8,  persistent = true, bordercolor:rgba(b4b4acff) rgba(b4b4accc) 45deg
workspace = 9,  persistent = true, bordercolor:rgba(e0ddd0ff) rgba(e0ddd0cc) 45deg
workspace = 10, persistent = true, bordercolor:rgba(88887cff) rgba(88887ccc) 45deg


##################
### WINDOW RULES ###
##################

windowrule {
    name = kitty-opacity
    match:class = kitty
    opacity = 0.85 0.75
}

windowrule {
    name = keepass-scratchpad
    match:class = org.keepassxc.KeePassXC
    workspace = special:keepass
    float = true
    size = 70% 70%
    center = true
}

windowrule {
    name = kitty-scratchpad
    match:class = kitty-scratch
    workspace = special:terminal
    float = true
    size = 1920 1176
    move = 0 0
}
